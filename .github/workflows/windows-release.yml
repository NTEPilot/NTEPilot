name: Windows Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag name, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Electron App
    runs-on: windows-latest

    env:
      UV_LINK_MODE: copy
      ELECTRON_RUN_AS_NODE: ""

    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $tag = "${{ github.ref_name }}"
            } else {
              $tag = "nightly-${{ github.run_number }}"
            }
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=NTEPilot $tag" >> $env:GITHUB_OUTPUT

      - name: Checkout NTEPilot
        uses: actions/checkout@v6
        with:
          path: NTEPilot

      - name: Checkout Electron shell
        uses: actions/checkout@v6
        with:
          repository: NTEPilot/NTE-electron
          path: NTE-electron
          token: ${{ secrets.NTE_ELECTRON_TOKEN || github.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: NTEPilot/uv.lock

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            NTEPilot/frontend/package-lock.json
            NTE-electron/package-lock.json

      - name: Build frontend
        shell: pwsh
        working-directory: NTEPilot/frontend
        run: |
          npm ci
          npm run build

      - name: Build backend virtual environment
        shell: pwsh
        working-directory: NTEPilot
        run: |
          uv venv --python 3.14 --relocatable .venv
          uv sync --frozen --no-dev --compile-bytecode

      - name: Install Electron dependencies
        shell: pwsh
        working-directory: NTE-electron
        run: npm ci

      - name: Build Windows executable
        shell: pwsh
        working-directory: NTE-electron
        run: npm run dist:win

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem -Path NTE-electron/dist -File |
            Where-Object { $_.Extension -in ".exe", ".blockmap", ".yml", ".yaml" } |
            Copy-Item -Destination release-assets

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ntepilot-windows-release
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
